version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: incident-api-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: incident-api
    ports:
      - "5433:5432"
    volumes:
      - incident-api_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: incident-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  incident-api_data:
  redis_data:
